<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Question ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    padding:20px;
    width:100%;
    max-width:500px;
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:30px 20px;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.heart{
    font-size:70px;
    animation:beat 1s infinite;
}

@keyframes beat{
    50%{
        transform:scale(1.15);
    }
}

h1{
    margin-top:15px;
    font-size:2rem;
}

p{
    margin-top:15px;
    line-height:1.6;
}

.buttons{
    margin-top:35px;
    position:relative;
    height:120px;
}

button{
    border:none;
    border-radius:50px;
    padding:14px 30px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

#yesBtn{
    background:white;
    color:#ff4f87;
}

#yesBtn:hover{
    transform:scale(1.05);
}

#noBtn{
    position:absolute;
    background:#ff4f87;
    color:white;
    left:60%;
}

.success{
    display:none;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

.big-heart{
    font-size:90px;
}

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
    }
}
</style>
</head>

<body>

<div class="container">

<div class="card" id="questionCard">

<div class="heart">❤️</div>

<h1>Hey Beautiful ✨</h1>

<p>
I have something important to ask...
</p>

<p style="font-size:22px;font-weight:700;margin-top:20px;">
Will you go on a date with me? 🥺
</p>

<div class="buttons">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">NO 😅</button>
</div>

</div>

<div class="card success" id="successCard">

<div class="big-heart">💖</div>

<h1>YAYYYYY!! 🎉</h1>

<p style="margin-top:20px;">
You just made me the happiest person alive ❤️
</p>

<p style="margin-top:15px;">
Now get ready for the best date ever 😎✨
</p>

</div>

</div>

<script>

const noBtn = document.getElementById("noBtn");

function moveButton() {

    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 80;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    noBtn.style.left = randomX + "px";
    noBtn.style.top = randomY + "px";
}

noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

document.getElementById("yesBtn").addEventListener("click", () => {

    document.getElementById("questionCard").style.display = "none";
    document.getElementById("successCard").style.display = "block";

    createConfetti();

    setTimeout(() => {

        // Optional:
        // window.location.href =
        // "https://wa.me/919999999999?text=I%20said%20YES!";

    }, 3000);
});

function createConfetti(){

    for(let i=0;i<120;i++){

        const confetti = document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left = Math.random()*100+"vw";
        confetti.style.background =
            `hsl(${Math.random()*360},100%,50%)`;

        confetti.style.animationDuration =
            (Math.random()*3+2)+"s";

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}
</script>

</body>
</html>
