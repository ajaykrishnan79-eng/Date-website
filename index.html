<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Cutie ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#ff758c,#ff7eb3);display:flex;justify-content:center;align-items:center;padding:20px}
.container{width:100%;max-width:500px}
.card{background:rgba(255,255,255,.15);backdrop-filter:blur(12px);border-radius:24px;padding:24px;color:#fff;text-align:center;box-shadow:0 15px 40px rgba(0,0,0,.2)}
.hero{width:100%;border-radius:16px;margin-bottom:15px}
.buttons{position:relative;height:160px;margin-top:20px}
button{border:none;border-radius:999px;padding:14px 24px;font-weight:600;cursor:pointer}
#yesBtn{background:#fff;color:#ff4f87}
#noBtn{position:absolute;left:60%;background:#ff4f87;color:#fff}
.hidden{display:none}
.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.option-grid button{background:#fff;color:#ff4f87}
.confetti{position:fixed;width:10px;height:10px;top:-10px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style>
</head>
<body>
<div class="container">
<div class="card" id="page1">
<img src="knight-princess.jpg" class="hero">
<h1>Hey Cutie ✨</h1>
<p>There is one question I've been wanting to ask you...</p>
<h2 style="margin-top:15px">Will you go on a date with me? ❤️</h2>
<div class="buttons">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">NO 😅</button>
</div>
</div>

<div class="card hidden" id="page2">
<h1>YAYYYY ❤️</h1>
<p>Choose our royal adventure 👑</p>
<div class="option-grid">
<button onclick="pick('Lunch 🍽️')">🍽️ Lunch</button>
<button onclick="pick('Dinner 🌙')">🌙 Dinner</button>
<button onclick="pick('Hiking 🥾')">🥾 Hiking</button>
<button onclick="pick('Movie 🎬')">🎬 Movie</button>
<button onclick="pick('Mystery Room 🕵️')">🕵️ Mystery Room</button>
<button onclick="pick('Surprise 🎁')">🎁 Surprise</button>
</div>
</div>

<div class="card hidden" id="page3">
<h1>👑❤️👸</h1>
<h2>Excellent Choice!</h2>
<p id="choiceText"></p>
<p style="margin-top:10px">See you soon Cutie ❤️</p>
</div>
</div>

<script>
emailjs.init({publicKey:"2srcSlWk5JAjHNSJ3"});

function sendMail(action, choice){
emailjs.send("service_145nnld","template_wcrb7lf",{
name:"Date Website",
time:new Date().toLocaleString(),
message:"Action: "+action+" | Choice: "+choice,
email:"ajaykrishnan79@gmail.com"
}).catch(console.error);
}

const noBtn=document.getElementById("noBtn");
function moveButton(){
const card=document.getElementById("page1");
noBtn.style.left=(Math.random()*(card.offsetWidth-120))+"px";
noBtn.style.top=(Math.random()*(card.offsetHeight-120))+"px";
}
noBtn.addEventListener("mouseenter",moveButton);
noBtn.addEventListener("touchstart",moveButton);
noBtn.addEventListener("click",moveButton);

document.getElementById("yesBtn").onclick=()=>{
sendMail("YES CLICKED","Waiting for option");
document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");
confetti();
};

function pick(choice){
sendMail("DATE OPTION SELECTED",choice);
document.getElementById("page2").classList.add("hidden");
document.getElementById("page3").classList.remove("hidden");
document.getElementById("choiceText").innerHTML="You selected <b>"+choice+"</b>";
confetti();
}

function confetti(){
for(let i=0;i<80;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
c.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),5000);
}
}
</script>
</body>
</html>
